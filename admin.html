<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Portfolio Admin</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    
    <!-- Login Screen -->
    <div id="login-screen" class="auth-screen">
        <div class="auth-card">
            <h1>🔐 تسجيل الدخول</h1>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
                <input type="password" id="login-password" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-primary">دخول</button>
            </form>
            <p class="auth-error" id="login-error"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard" style="display: none;">
        
        <!-- Header -->
        <header class="dashboard-header">
            <h1>🎨 لوحة تحكم البورتفوليو</h1>
            <button id="logout-btn" class="btn-secondary">تسجيل خروج</button>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="about">نبذة</button>
            <button class="tab-btn" data-tab="interests">الاهتمامات</button>
            <button class="tab-btn" data-tab="skills">المهارات</button>
            <button class="tab-btn" data-tab="certificates">الشهادات</button>
            <button class="tab-btn" data-tab="projects">المشاريع</button>
            <button class="tab-btn" data-tab="education">التعليم</button>
            <button class="tab-btn" data-tab="contact">التواصل</button>
        </div>

        <!-- Tab Contents -->
        <div class="tab-content active" id="about-tab">
            <h2>📝 تحرير النبذة</h2>
            <textarea id="about-text-en" placeholder="النص بالإنجليزي" rows="5"></textarea>
            <textarea id="about-text-ar" placeholder="النص بالعربي" rows="5"></textarea>
            <button onclick="saveAbout()" class="btn-primary">حفظ</button>
        </div>

        <div class="tab-content" id="interests-tab">
            <h2>💡 إدارة الاهتمامات</h2>
            <div class="add-form">
                <input type="text" id="interest-title-en" placeholder="العنوان (EN)">
                <input type="text" id="interest-title-ar" placeholder="العنوان (AR)">
                <input type="text" id="interest-icon" placeholder="Emoji 🎨">
                <button onclick="addInterest()" class="btn-primary">إضافة</button>
            </div>
            <div id="interests-list" class="items-list"></div>
        </div>

        <div class="tab-content" id="skills-tab">
            <h2>💪 إدارة المهارات</h2>
            <div class="add-form">
                <input type="text" id="skill-name-en" placeholder="اسم المهارة (EN)">
                <input type="text" id="skill-name-ar" placeholder="اسم المهارة (AR)">
                <input type="number" id="skill-percentage" placeholder="النسبة %" min="0" max="100">
                <select id="skill-type">
                    <option value="technical">Technical</option>
                    <option value="soft">Soft</option>
                </select>
                <button onclick="addSkill()" class="btn-primary">إضافة</button>
            </div>
            <div id="skills-list" class="items-list"></div>
        </div>

        <div class="tab-content" id="certificates-tab">
            <h2>🏆 إدارة الشهادات</h2>
            <div class="add-form">
                <input type="text" id="cert-title-en" placeholder="اسم الشهادة (EN)">
                <input type="text" id="cert-title-ar" placeholder="اسم الشهادة (AR)">
                <input type="text" id="cert-org-en" placeholder="المؤسسة (EN)">
                <input type="text" id="cert-org-ar" placeholder="المؤسسة (AR)">
                <input type="file" id="cert-file" accept=".pdf,image/*">
                <button onclick="addCertificate()" class="btn-primary">إضافة</button>
            </div>
            <div id="certificates-list" class="items-list"></div>
        </div>

        <div class="tab-content" id="projects-tab">
            <h2>🚀 إدارة المشاريع</h2>
            <div class="add-form">
                <input type="text" id="project-title-en" placeholder="اسم المشروع (EN)">
                <input type="text" id="project-title-ar" placeholder="اسم المشروع (AR)">
                <textarea id="project-short-en" placeholder="وصف قصير (EN)" rows="2"></textarea>
                <textarea id="project-short-ar" placeholder="وصف قصير (AR)" rows="2"></textarea>
                <textarea id="project-full-en" placeholder="وصف كامل (EN)" rows="4"></textarea>
                <textarea id="project-full-ar" placeholder="وصف كامل (AR)" rows="4"></textarea>
                <input type="text" id="project-tools" placeholder="الأدوات (مفصولة بفاصلة)">
                <input type="text" id="project-github" placeholder="رابط GitHub">
                <input type="text" id="project-demo" placeholder="رابط Demo">
                <input type="file" id="project-images" accept="image/*" multiple>
                <button onclick="addProject()" class="btn-primary">إضافة</button>
            </div>
            <div id="projects-list" class="items-list"></div>
        </div>

        <div class="tab-content" id="education-tab">
            <h2>🎓 إدارة التعليم</h2>
            <div class="add-form">
                <input type="text" id="edu-degree-en" placeholder="الدرجة العلمية (EN)">
                <input type="text" id="edu-degree-ar" placeholder="الدرجة العلمية (AR)">
                <input type="text" id="edu-org-en" placeholder="الجامعة (EN)">
                <input type="text" id="edu-org-ar" placeholder="الجامعة (AR)">
                <input type="text" id="edu-start" placeholder="من (2021)">
                <input type="text" id="edu-end" placeholder="إلى (2026)">
                <button onclick="addEducation()" class="btn-primary">إضافة</button>
            </div>
            <div id="education-list" class="items-list"></div>
        </div>

        <div class="tab-content" id="contact-tab">
            <h2>📞 معلومات التواصل</h2>
            <input type="email" id="contact-email" placeholder="البريد الإلكتروني">
            <input type="text" id="contact-phone" placeholder="رقم الجوال">
            <input type="url" id="contact-github" placeholder="رابط GitHub">
            <input type="url" id="contact-linkedin" placeholder="رابط LinkedIn">
            <button onclick="saveContact()" class="btn-primary">حفظ</button>
        </div>

    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="admin-script.js"></script>
</body>
</html>
